project:
  type: book
  output-dir: _book
  execute-dir: project

dotenv:
  - required: false
    allowEmptyValues: true

book:
  title: "Global Flood Monitoring"
  subtitle: "CHD Dsci Exploration"
  author: "OCHA Centre for Humanitarian Data"
  date: today
  search: true
  repo-url: https://github.com/OCHA-DAP/ds-flood-gfm
  repo-actions: [edit, issue]
  
  chapters:
    - index.qmd
    - 01_querying_gfm.qmd
    - 02_temporal_compositing.qmd
    - 03_population_exposure.qmd
    - 04_production_pipeline.qmd

  appendices:
    - part: "Design Decisions"
      chapters:
        - A5_why_custom_pipeline.qmd
    - part: "Early Project Development"
      chapters:
        - A1_poc_latst_image_composite.qmd
        - A2_poc_gfm_anomaly_flag.qmd
        - A3_cameroon_snapshots.qmd
        - A4_hurricane_melissa.qmd

format:
  html:
    theme: cosmo
    css: custom.css
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 3
    code-fold: true
    code-tools: true
    fig-dpi: 96
    fig-format: png
    fig-width: 8
    fig-height: 6
    smooth-scroll: true

execute:
  freeze: auto
  cache: false
  echo: true
  warning: false
  error: false

jupyter:
  kernelspec:
    name: "ds-flood-gfm"
    language: "python"
    display_name: "ds-flood-gfm"